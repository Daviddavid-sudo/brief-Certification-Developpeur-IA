name: Django CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # If you use Postgres later, you'd add it here. 
      # For now, we use the default SQLite.
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        python manage.py test
      env:
        # Add dummy env vars so the CI doesn't crash 
        # looking for your Groq Key
        GROQ_API_KEY: "dummy_key_for_testing"
        SECRET_KEY: "ci-secret-key"
        DEBUG: "True"