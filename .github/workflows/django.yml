name: Django CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: certificate_dev
        ports:
          - 5432:5432
        # Simple health check to verify the port is open
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      POSTGRES_DB: certificate_dev
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      # Use the IP address directly to avoid any localhost/IPv6 resolution confusion
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      # Explicitly set settings for the CI environment
      DJANGO_SETTINGS_MODULE: mon_projet.settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          # Install the client to get pg_isready on the runner
          sudo apt-get update && sudo apt-get install -y postgresql-client
          # Wait up to 60 seconds for the database to accept connections
          timeout 60s bash -c 'until pg_isready -h 127.0.0.1 -p 5432 -U ${{ secrets.POSTGRES_USER }}; do echo "Waiting for postgres..."; sleep 2; done'

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test